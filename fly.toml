# fly.toml app configuration file generated for quantstream-labs-api-curious-butterfly-4781 on 2026-07-02T21:50:47-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'quantstream-labs-api'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile'

[processes]
  app = 'quantstream-api'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
