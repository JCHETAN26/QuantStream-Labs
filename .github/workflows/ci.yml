name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install all packages
        run: |
          python -m pip install --upgrade pip
          for pkg in packages/* services/* apps/*; do
            if [ -f "$pkg/pyproject.toml" ]; then
              pip install -e "$pkg[dev]"
            fi
          done
      - name: Lint
        run: |
          for pkg in packages/* services/* apps/*; do
            if [ -f "$pkg/pyproject.toml" ]; then
              ruff check "$pkg"
            fi
          done
      - name: Test
        run: |
          for pkg in packages/* services/* apps/*; do
            if [ -f "$pkg/pyproject.toml" ]; then
              echo "== $pkg =="
              ( cd "$pkg" && pytest -q )
            fi
          done
      - name: Smoke-test the demo
        run: quantstream-demo --no-report

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the demo image
        run: docker build -t quantstream-labs-demo .
      - name: Run the demo in the container
        run: |
          docker run --rm quantstream-labs-demo quantstream-demo --no-report | tee out.txt
          grep -q "Mirage Score:" out.txt
          grep -q "not research-safe" out.txt

  cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S services/replay-engine-cpp -B build-cpp -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build-cpp
      - name: Test (cross-language golden match)
        run: ctest --test-dir build-cpp --output-on-failure

