name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e "packages/contracts[dev]"
      - name: Lint
        run: ruff check packages/contracts
      - name: Test
        run: pytest packages/contracts -q
