# Ways in:
#   docker compose up --build          -> runs the demo (prints the verdict, writes the report)
#   docker compose up --build api      -> serves the API at http://localhost:8000
#   docker compose up redpanda         -> a single-node Redpanda broker for the KafkaSink
services:
  demo:
    build: .
    image: quantstream-labs
    volumes:
      - ./out:/app/out

  api:
    build: .
    image: quantstream-labs
    command: ["quantstream-api"]
    ports:
      - "8000:8000"

  # Redpanda: the Kafka-compatible bus the replay engine's KafkaSink publishes to.
  # Single node, single-partition canonical topic (order preserved on the wire).
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
